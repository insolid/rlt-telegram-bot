services:
  bot:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    command: sh -c "alembic upgrade head && alembic revision --autogenerate && alembic upgrade head && python3 -m app.bot"
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
